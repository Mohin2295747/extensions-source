name: CI

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '**'
      - '!**.md'
      - '!.github/**'
      - '.github/scripts/**'
      - '.github/workflows/build_push.yml'
      - '!.gitignore'

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

env:
  CI_CHUNK_SIZE: 288

jobs:
  prepare:
    name: Prepare job
    runs-on: ubuntu-latest
    outputs:
      individualMatrix: ${{ steps.generate-matrices.outputs.individualMatrix }}
    steps:
      - name: Clone repo
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Validate Gradle Wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Get number of modules
        run: |
          set -x
          projects=(src/*/*)
          echo "NUM_INDIVIDUAL_MODULES=${#projects[@]}" >> "$GITHUB_ENV"

      - id: generate-matrices
        name: Create output matrices
        uses: actions/github-script@v7
        with:
          script: |
            const numIndividualModules = parseInt(process.env.NUM_INDIVIDUAL_MODULES);
            const chunkSize = parseInt(process.env.CI_CHUNK_SIZE);
            const numIndividualChunks = Math.ceil(numIndividualModules / chunkSize);
            
            console.log(`Individual modules: ${numIndividualModules} (${numIndividualChunks} chunks of ${chunkSize})`);
            
            core.setOutput('individualMatrix', JSON.stringify({ chunk: [...Array(numIndividualChunks).keys()] }));

  build_individual:
    name: Build individual modules
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{ fromJSON(needs.prepare.outputs.individualMatrix) }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build extensions (chunk ${{ matrix.chunk }})
        env:
          CI_CHUNK_NUM: ${{ matrix.chunk }}
        run: |
          chmod +x ./gradlew
          # Force User-Agent into gradle.properties
          echo "systemProp.http.agent=Mozilla/5.0" >> gradle.properties
          echo "systemProp.https.agent=Mozilla/5.0" >> gradle.properties
          
          ./gradlew -p src assembleDebug --no-parallel

      - name: Store build cache
        uses: actions/cache/save@v3
        with:
          path: |
            src/**/build
            !src/**/build/outputs
          key: build-cache-${{ github.sha }}-${{ matrix.chunk }}

      - name: Upload APKs (chunk ${{ matrix.chunk }})
        uses: actions/upload-artifact@v4
        with:
          name: individual-apks-${{ matrix.chunk }}
          path: "**/*.apk"
          retention-days: 1

  collect_apks:
    name: Collect all APKs
    needs: build_individual
    runs-on: ubuntu-latest
    steps:
      - name: Download all APK artifacts
        uses: actions/download-artifact@v4
        with:
          path: downloaded-artifacts
          
      - name: Create unified APK directory
        run: mkdir -p all_apks
          
      - name: Gather all APKs
        run: |
          find downloaded-artifacts -name "*.apk" -type f -exec cp -v {} all_apks/ \;
          echo "Collected $(ls -1 all_apks | wc -l) APK files"
          
      - name: Upload all APKs as single artifact
        uses: actions/upload-artifact@v4
        with:
          name: all-extensions-apks
          path: all_apks/
          retention-days: 1

  create_release:
    name: Create GitHub Release
    needs: collect_apks
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Required to create releases and upload assets
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch all tags for version calculation

      - name: Download all APKs
        uses: actions/download-artifact@v4
        with:
          name: all-extensions-apks
          path: all_apks

      - name: Count APK files
        id: count
        run: |
          count=$(find all_apks -name "*.apk" | wc -l)
          echo "APK_COUNT=$count" >> $GITHUB_ENV
          echo "Found $count APK files"

      - name: Skip release if APK count > 10
        if: env.APK_COUNT > 10
        run: |
          echo "APK count (${{ env.APK_COUNT }}) exceeds limit (10). Skipping release creation."
          exit 0

      - name: Compute next version tag
        id: version
        uses: actions/github-script@v7
        with:
          script: |
            // List all tags that match the version pattern vX.X.X.X
            const { data: tags } = await github.rest.repos.listTags({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100
            });
            
            const versionPattern = /^v\d+\.\d+\.\d+\.\d+$/;
            const validTags = tags
              .map(t => t.name)
              .filter(t => versionPattern.test(t))
              .sort((a, b) => {
                // Sort by version components
                const aParts = a.slice(1).split('.').map(Number);
                const bParts = b.slice(1).split('.').map(Number);
                for (let i = 0; i < 4; i++) {
                  if (aParts[i] !== bParts[i]) return aParts[i] - bParts[i];
                }
                return 0;
              });
            
            let nextVersion;
            if (validTags.length === 0) {
              nextVersion = "v0.0.0.1";
            } else {
              const latestTag = validTags[validTags.length - 1];
              let parts = latestTag.slice(1).split('.').map(Number);
              // Increment last part with carry-over (base 10)
              let pos = parts.length - 1;
              while (pos >= 0) {
                parts[pos]++;
                if (parts[pos] < 10) break;
                parts[pos] = 0;
                pos--;
              }
              // If first part also rolled over (unlikely), prefix with 'v'
              nextVersion = "v" + parts.join('.');
            }
            
            console.log(`Next version: ${nextVersion}`);
            core.setOutput("tag", nextVersion);

      - name: Prepare release notes (list of APK filenames)
        id: notes
        run: |
          cd all_apks
          # Generate one filename per line
          ls -1 *.apk > ../filenames.txt
          cd ..
          echo "RELEASE_NOTES<<EOF" >> $GITHUB_ENV
          cat filenames.txt >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Create GitHub Release and upload assets
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            --title "Extensions" \
            --notes "${{ env.RELEASE_NOTES }}" \
            --latest \
            ./all_apks/*.apk